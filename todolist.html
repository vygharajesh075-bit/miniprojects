<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="odolist.css">
</head>
<body>

  <div class="container">
    <h1>📝 My To-Do List</h1>

    <div class="input-box">
      <input 
        type="text" 
        id="taskInput" 
        placeholder="Enter a task..." 
      >
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script3.js"></script>

</body>
</html>
