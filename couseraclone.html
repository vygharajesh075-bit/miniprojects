<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Coursera</title>
    <link rel="stylesheet" href="cousera.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <div class="logo">Coursera</div>
            <ul class="nav-links">
                <li><a href="#">Overview</a></li>
                <li><a href="#">Events & Presentations</a></li>
                <li><a href="#">Stock Information</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <section class="quick-links">
            <div>FAQ</div>
            <div>Email Alerts</div>
            <div>Information Request Form</div>
            <div>Contact Support</div>
        </section>

        <p>
            For investor relations inquiries, please contact 
            <a href="mailto:ir@coursera.org">ir@coursera.org</a>
        </p>
    </main>

  
    <footer class="footer">
        
        <div class="footer-logo">Coursera</div>

        <div class="social">
            <h4>Follow Us</h4>
            <p>Facebook</p>
            <p>YouTube</p>
        </div>

        <div class="email-alerts">
            <h4>Email Alerts</h4>
            <form>
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>

        <div class="preferences">
            <h4>Preferences</h4>
            <label><input type="checkbox"> End of Sales</label>
            <label><input type="checkbox"> News</label>
            <label><input type="checkbox"> Annual Reports</label>
            <label><input type="checkbox"> SEC Filings</label>
            <label><input type="checkbox"> Quarterly Reports</label>
        </div>

    </footer>

</body>
</html>
